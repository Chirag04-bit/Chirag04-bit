<svg viewBox="0 0 1000 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="stack — languages, tools, frameworks">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --dim: #AAAAAA; --accent:#0284c7; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --dim: #666666; --accent:#0284c7; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
    .a1{animation-delay:.1s} .a2{animation-delay:.2s} .a3{animation-delay:.35s}
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
    :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent:#0284c7; --node-bg: #FFFFFF; --core-bg: #FFFFFF; --ghost: #000000; }
  </style>
  <text class="mono rise a1" x="48" y="32" font-size="11" fill="var(--muted)" letter-spacing="2.5">LANGUAGES</text>
  <text class="mono rise a1" x="154" y="32" font-size="15" fill="var(--bone)">Python · SQL · C</text>
  <text class="mono rise a2" x="48" y="72" font-size="11" fill="var(--muted)" letter-spacing="2.5">AI/ML</text>
  <text class="mono rise a2" x="154" y="72" font-size="15" fill="var(--bone)">Generative AI · LLMs · RAG · Scikit-Learn · XGBoost</text>
  <text class="mono rise a3" x="48" y="112" font-size="11" fill="var(--muted)" letter-spacing="2.5">TOOLS</text>
  <text class="mono rise a3" x="154" y="112" font-size="15" fill="var(--bone)">LangChain · Gemini API · FAISS · Streamlit · Flask · Git</text>
</svg>
