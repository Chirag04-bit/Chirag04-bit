  <svg viewBox="0 0 1000 370" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three projects by Chirag Sharma">
  <style>
    .mono { font-family:ui-monospace,"SFMono-Regular","SF Mono",Menlo,Consolas,"Liberation Mono",monospace; }
    .row { opacity:1; }
    .rule { stroke:#000; stroke-width:1; }
    .title { fill:#000; font-size:17px; font-weight:700; letter-spacing:.8px; }
    .copy { fill:#000; font-size:12px; }
    .meta { fill:#000; font-size:11px; letter-spacing:.4px; }
  </style>

  <g class="mono">
    <g class="row" transform="translate(0 20)">
      <text class="title" x="48" y="24">01 / REPOSENSE AI</text>
      <text class="copy" x="48" y="49">AI-powered GitHub repository analyzer using Retrieval-Augmented Generation (RAG).</text>
      <text class="copy" x="48" y="68">Implements repo chat, README generation, and semantic code search via Gemini API.</text>
      <text class="meta" x="48" y="87">PYTHON · LANGCHAIN · FAISS · GEMINI API</text>
      <line class="rule" x1="48" y1="104" x2="952" y2="104"/>
    </g>
    <g class="row" transform="translate(0 130)">
      <text class="title" x="48" y="24">02 / VITALIT DIGITAL TWIN</text>
      <text class="copy" x="48" y="49">Healthcare framework for real-time physiological monitoring using biomedical sensors.</text>
      <text class="copy" x="48" y="68">Integrates AI-driven anomaly detection with Grafana dashboards and cloud synchronization.</text>
      <text class="meta" x="48" y="87">PYTHON · RASPBERRY PI · GRAFANA · ANOMALY DETECTION</text>
      <line class="rule" x1="48" y1="104" x2="952" y2="104"/>
    </g>
    <g class="row" transform="translate(0 240)">
      <text class="title" x="48" y="24">03 / GENERAL HEALTH PREDICTOR</text>
      <text class="copy" x="48" y="49">ML web application predicting health risks based on medical and lifestyle parameters.</text>
      <text class="copy" x="48" y="68">Features comprehensive preprocessing, feature scaling, and deployment via Flask.</text>
      <text class="meta" x="48" y="87">PYTHON · FLASK · SCIKIT-LEARN · MODEL DEPLOYMENT</text>
      <line class="rule" x1="48" y1="104" x2="952" y2="104"/>
    </g>
  </g>
</svg>
